name: Bug Report
description: Report a problem or error in StadiumOS operations
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this bug report form to help us locate and resolve issues.
  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      placeholder: Provide a clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Select Fan view
        2. Click 'AI Navigator'
        3. Submit starting gate
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: Chrome 124, Windows 11
    validations:
      required: false
