name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 22
        cache: 'npm'

    - name: Environment Diagnostics
      run: |
        echo "=== CLI Versions ==="
        node -v
        npm -v
        echo "=== Directory Listing ==="
        ls -la
        echo "=== Package-lock Existence Check ==="
        if [ -f "package-lock.json" ]; then
          echo "package-lock.json exists."
        else
          echo "WARNING: package-lock.json NOT found!"
        fi

    - name: Install Dependencies (Verbose)
      run: |
        npm ci --verbose

    - name: Dependency Tree diagnostics
      run: |
        echo "=== npm ls ==="
        npm ls || true

    - name: Type Check (with Extended Diagnostics)
      run: |
        npx tsc --noEmit --extendedDiagnostics

    - name: Run Linting (stylish format)
      run: |
        npm run lint -- --format stylish

    - name: Run Tests (Verbose)
      run: |
        npm run test -- --verbose > test-results.log 2>&1

    - name: Dump Test Results
      if: always()
      run: |
        if [ -f "test-results.log" ]; then
          echo "=== Jest Test Results ==="
          cat test-results.log
        else
          echo "No test results file found."
        fi

    - name: Build Application
      run: |
        npm run build > build-results.log 2>&1
      env:
        NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo.firebaseapp.com
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-project
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo.appspot.com
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
        NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:demo
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NODE_ENV: production

    - name: Dump Build Results
      if: always()
      run: |
        if [ -f "build-results.log" ]; then
          echo "=== Next.js Build Results ==="
          cat build-results.log
        else
          echo "No build results file found."
        fi
